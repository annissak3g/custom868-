services:
  - type: web
    name: playbeat-backend
    env: node
    repo: "https://github.com/annissak3g/custom868-.git"
    branch: main
    plan: free
    buildCommand: "cd 2 && npm install"
    startCommand: "cd 2 && npm start"
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
      - key: FRONTEND_URL
        value: "https://custom868.vercel.app"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
